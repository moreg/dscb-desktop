    // =================== 工具 ===================
    function relativeTime(iso) {
      const d = new Date(iso); const diff = Math.floor((Date.now() - d.getTime()) / 1000)
      if (diff < 60) return '刚刚'
      if (diff < 3600) return Math.floor(diff/60) + ' 分钟前'
      if (diff < 86400) return Math.floor(diff/3600) + ' 小时前'
      if (diff < 86400 * 7) return Math.floor(diff/86400) + ' 天前'
      return d.toLocaleDateString('zh-CN')
    }

    // =================== 章节分析模拟 ===================
    function analyzePreview(text, segments) {
      segments = segments || 12
      const t = (text || '').replace(/\r/g, '')
      const words = t.replace(/\s+/g, '').length
      const paragraphs = t.split(/\n+/).filter(p => p.trim().length > 0)
      const sentences = t.split(/[。！？!?]+/).filter(s => s.trim().length > 0)
      const longest = paragraphs.reduce((m, p) => Math.max(m, p.replace(/\s+/g, '').length), 0)
      const dq = (t.match(/[「」""]/g) || []).length
      const filler = (t.match(/[的了着过啊呢嘛吧哦嗯]/g) || []).length
      const POS = ['笑','喜','光','明','胜','破','暖','希望','喜','温柔','光明','胜利','喜悦','微笑']
      const NEG = ['哭','泪','痛','伤','恨','怒','寒','冷','血','杀','死','灭','背叛','恐惧','绝望']
      const TENSE = ['急','猛','疾','速','爆','突','冲','杀','刺','爆裂','轰鸣','火焰']
      const CALM = ['静','宁','缓','慢','微','风','月','雪','雾','溪','宁静','安详','沉思','微风']
      function cnt(s, ws) { let n=0; for (const w of ws) { let i=0; while((i=s.indexOf(w,i))>=0){n++;i+=w.length} } return n }
      const chunk = Math.max(1, Math.floor(t.length / segments))
      const curve = []
      for (let i = 0; i < segments; i++) {
        const s = t.slice(i*chunk, i === segments-1 ? t.length : (i+1)*chunk)
        const pos = cnt(s, POS), neg = cnt(s, NEG)
        const t1 = cnt(s, TENSE), c1 = cnt(s, CALM)
        const intensity = Math.min(1, (t1 + c1) / 20)
        const score = Math.max(-100, Math.min(100, (pos - neg) * 4 * (0.5 + intensity)))
        curve.push(Math.round(score))
      }
      return {
        wordCount: words,
        paragraphCount: paragraphs.length,
        sentenceCount: sentences.length,
        avgSentenceLen: sentences.length ? Math.round(words / sentences.length) : 0,
        longestParagraphLen: longest,
        dialogueRatio: words === 0 ? 0 : dq / words,
        fillerRatio: words === 0 ? 0 : filler / words,
        emotionCurve: curve
      }
    }
    function rhythmWarnings(s) {
      const out = []
      if (s.longestParagraphLen > 200) out.push({ level: s.longestParagraphLen > 350 ? 2 : 1, msg: '最长段落 ' + s.longestParagraphLen + ' 字' + (s.longestParagraphLen > 350 ? '（建议拆分）' : '（略长）') })
      if (s.fillerRatio > 0.12) out.push({ level: s.fillerRatio > 0.2 ? 2 : 1, msg: '虚词占比 ' + (s.fillerRatio*100).toFixed(1) + '%' + (s.fillerRatio > 0.2 ? '（明显过多）' : '（偏多）') })
      if (s.avgSentenceLen > 50) out.push({ level: 1, msg: '平均句长 ' + s.avgSentenceLen + ' 字（偏长）' })
      return out
    }
    function buildPreview(text) {
      const hits = []
      const push = (term, kind, label) => {
        if (!term) return
        let idx = 0
        while ((idx = text.indexOf(term, idx)) >= 0) {
          hits.push({ start: idx, end: idx + term.length, kind, label, text: term })
          idx += term.length
        }
      }
      CHARACTERS.forEach(c => push(c.name, 'char', '人物'))
      FORESHADOWS.forEach(f => push(f.content, 'foreshadow', '伏笔'))
      LOCATIONS.forEach(l => push(l.name, 'location', '地点'))
      hits.sort((a, b) => a.start - b.start)
      const merged = []
      for (const h of hits) {
        const last = merged[merged.length - 1]
        if (last && h.start < last.end) continue
        merged.push(h)
      }
      const out = []
      let cursor = 0
      for (const h of merged) {
        if (h.start > cursor) out.push({ text: text.slice(cursor, h.start) })
        out.push({ text: text.slice(h.start, h.end), hl: h })
        cursor = h.end
      }
      if (cursor < text.length) out.push({ text: text.slice(cursor) })
      return out
    }

        return `<div class="emotion-bar ${cls}" style="height:${h}px;margin-top:${positive ? 32-h : 32}px;align-self:${positive ? 'flex-end' : 'flex-start'}"></div>`

                  <div class="meta-row">
                    ${f.plantChapter ? `<span class="ch plant">埋 · 第 ${f.plantChapter} 章</span>` : ''}
                    ${f.expectedCollect ? `<span class="ch ${overdue ? 'overdue' : 'collect'}">${overdue ? '⚠ 逾期 · 第 ' : '预收 · 第 '}${f.expectedCollect} 章</span>` : ''}
                    ${f.actualCollect ? `<span class="ch collect">实收 · 第 ${f.actualCollect} 章</span>` : ''}
                  </div>
                  ${f.note ? `<div class="muted" style="font-size:12px">${f.note}</div>` : ''}
                  <div class="actions">
                    ${st === 'pending' ? '<button class="btn btn-sm">埋设</button>' : ''}
                    ${st === 'planted' ? '<button class="btn btn-sm">回收</button><button class="btn btn-sm">遗漏</button>' : ''}
                    <button class="btn btn-sm">编辑</button>
                    <button class="btn btn-sm btn-danger">删</button>
                  </div>
                </div>`
              }).join('')}
            </div>`
          }).join('')}
        </div>
      </div>`
    }

    function renderRelationship() {
      const cx = 360, cy = 260
      const grouped = {}
      CHARACTERS.forEach(c => {
        const f = c.role || '其他'
        if (!grouped[f]) grouped[f] = []
        grouped[f].push(c)
      })
      const factions = Object.entries(grouped)
      const positions = {}
      factions.forEach(([f, list], gi) => {
        const fAngle = (gi / factions.length) * Math.PI * 2 - Math.PI / 2
        const fx = cx + Math.cos(fAngle) * 180
        const fy = cy + Math.sin(fAngle) * 140
        list.forEach((c, i) => {
          const a = (i / Math.max(list.length,1)) * Math.PI * 2
          positions[c.id] = {
            x: fx + Math.cos(a) * 35,
            y: fy + Math.sin(a) * 35
          }
        })
      })
      const factionRects = factions.map(([f, list]) => {
        const xs = list.map(c => positions[c.id].x)
        const ys = list.map(c => positions[c.id].y)
        const minX = Math.min(...xs) - 38, maxX = Math.max(...xs) + 38
        const minY = Math.min(...ys) - 30, maxY = Math.max(...ys) + 48
        return `<rect class="faction-halo" x="${minX}" y="${minY}" width="${maxX-minX}" height="${maxY-minY}" rx="10"></rect>
          <text x="${(minX+maxX)/2}" y="${minY - 4}" text-anchor="middle" style="font-size:11px;fill:var(--ink-3);font-family:var(--font-sans)">${f}</text>`
      }).join('')
      const edges = RELATIONSHIPS.map(r => {
        const a = positions[r.characterAId], b = positions[r.characterBId]
        if (!a || !b) return ''
        const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2
        return `<g>
          <line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" class="rel-edge selected" />
          <rect x="${mx - r.relationType.length * 6}" y="${my - 9}" width="${r.relationType.length * 12}" height="18" rx="4" fill="var(--paper-card)" stroke="var(--accent)" />
          <text x="${mx}" y="${my + 4}" class="rel-edge-label">${r.relationType}</text>
        </g>`
      }).join('')
      const nodes = CHARACTERS.map(c => {
        const p = positions[c.id]
        const sel = c.id === 'c1'
        return `<g>
          <circle cx="${p.x}" cy="${p.y}" r="22" class="rel-node-circle ${sel ? 'selected' : ''}" />
          <text x="${p.x}" y="${p.y + 4}" class="rel-node-label">${avatarOf(c.name)}</text>
          <text x="${p.x}" y="${p.y + 38}" class="rel-node-label" style="font-size:11.5px;fill:var(--ink-2)">${c.name}</text>
        </g>`
      }).join('')
      return pageHeader('本地创作 · AI 辅助 · 温暖纸笺') + `
        <div class="row">
          <button class="btn btn-ghost btn-sm">‹ 记忆中心</button>
          <div class="btn-group">
            <button class="btn btn-sm" title="重新排布节点">⟳ 重新排布</button>
            <button class="btn btn-sm" title="让 AI 扫描近期章节，推断人物关系">🤖 AI 推断关系</button>
            <button class="btn btn-primary btn-sm">+ 新关系</button>
          </div>
        </div>
        <h2 class="section mt">人物关系</h2>
        <div class="rel-layout">
          <div class="relation-graph" style="height:520px">
            <svg viewBox="0 0 720 520" preserveAspectRatio="xMidYMid meet">
              ${factionRects}
              ${edges}
              ${nodes}
            </svg>
          </div>
          <aside class="rel-detail">
            <h3 class="sub" style="margin-top:0">陆沉</h3>
            <span class="chip chip-accent">主角</span>
            <p class="muted" style="font-size:13px;margin-top:8px">身份：剑冢遗孤</p>
            <p class="muted" style="font-size:13px">性格：沉默寡言</p>
            <hr class="soft" />
            <h4 class="sub" style="margin-top:0">关系</h4>
            <div style="font-size:13px;padding:4px 0;border-bottom:1px solid var(--line);cursor:pointer">
              <span class="chip chip-accent">恋人</span> 沈清漪
            </div>
            <div style="font-size:13px;padding:4px 0;border-bottom:1px solid var(--line);cursor:pointer">
              <span class="chip chip-accent">仇人</span> 姜北辰
            </div>
            <div style="font-size:13px;padding:4px 0;border-bottom:1px solid var(--line);cursor:pointer">
              <span class="chip chip-accent">主仆</span> 姜老仆
            </div>
          </aside>
        </div>

        <div class="dialog-overlay" style="position:relative;inset:auto;padding:0;background:transparent;margin-top:14px">
          <div class="card" style="padding:14px;max-width:520px">
            <div class="row" style="margin-bottom:6px">
              <strong style="font-size:14px">🤖 AI 关系推断</strong>
              <button class="btn btn-ghost btn-sm">关闭</button>
            </div>
            <div style="background:var(--paper-soft);border:1px solid var(--line);border-radius:var(--r-sm);padding:8px;margin-bottom:10px">
              <strong style="font-size:12.5px;color:var(--warning)">⚠ 1 条涉及未知人物（名字未匹配人物库）</strong>
              <p class="muted" style="font-size:12px;margin-top:4px">陆沉↔黑袍人</p>
            </div>
            <div class="row" style="margin-bottom:8px">
              <span class="meta">共 ${REL_SUGGESTIONS.length} 条 · 可新增 2</span>
              <button class="btn btn-primary btn-sm">全部新增（2）</button>
            </div>
            ${REL_SUGGESTIONS.map(s => {
              const status = s.exists ? '已存在' : (s.known ? '可新增' : '人物未知')
              const border = s.exists ? 'var(--success)' : (s.known ? 'var(--accent)' : 'var(--warning)')
              return `<div class="cast-suggestion" style="border-left:3px solid ${border}">
                <div class="row" style="align-items:baseline">
                  <span class="name">${s.characterA} <span class="muted">↔</span> ${s.characterB}</span>
                  <span class="meta" style="margin-left:auto;font-size:11.5px">${status}</span>
                </div>
                <div style="margin-top:4px">
                  <span class="chip chip-accent">${s.relationType}</span>
                  <span class="chip" style="margin-left:4px">强度 ${s.strength}</span>
                </div>
                <div class="reason">${s.description}</div>
              </div>`
            }).join('')}
          </div>
        </div>
      </div>`
    }

    function renderSettings() {
      return pageHeader('本地创作 · AI 辅助 · 温暖纸笺') + `
        <button class="btn btn-ghost btn-sm">‹ 返回</button>
        <h2 class="section mt">设置</h2>
        <div class="card" style="max-width:560px">
          <h3 class="sub">外观</h3>
          <p class="muted" style="margin-top:4px;font-size:13px">切换浅色/深色主题，或跟随系统设置。</p>
          <div class="theme-toggle" style="margin-top:8px">
            <button class="active" onclick="setThemePreview('light')">☀ 浅色</button>
            <button onclick="setThemePreview('dark')">☾ 深色</button>
            <button onclick="setThemePreview('system')">◐ 跟随系统</button>
          </div>
        </div>
        <div class="card" style="max-width:560px;margin-top:16px">
          <h3 class="sub">书籍保存位置</h3>
          <p class="muted" style="word-break:break-all;margin-bottom:10px;font-size:13px">
            C:\Users\Administrator\.ai-writer\projects
          </p>
          <button class="btn btn-ghost">更改保存位置</button>
          <p class="meta" style="margin-top:10px">新建项目将保存到此位置。已有项目不受影响。</p>
        </div>
        <div class="card" style="max-width:560px;margin-top:16px">
          <div class="row" style="margin-bottom:4px">
            <h3 class="sub" style="margin:0">MiniMax API Key</h3>
            <span class="chip chip-success" style="margin-left:8px">✓ 已配置</span>
          </div>
          <p class="muted" style="margin-top:6px">用于大纲生成、细纲生成、章节续写、改稿建议。Key 仅在你本机加密保存，不会上传。</p>
          <div class="field">
            <label>API Key</label>
            <input class="input" type="password" placeholder="已配置 · 留空保持不变" />
          </div>
          <div class="row" style="gap:8px">
            <button class="btn btn-primary">保存</button>
            <button class="btn">测试连通</button>
          </div>
          <p style="color:var(--success);margin-top:12px;font-size:13px;font-family:ui-monospace,Consolas,monospace">✓ 连通 · 模型 MiniMax-Text-01</p>
          <p class="meta" style="margin-top:16px">Key 经 Electron safeStorage（Windows DPAPI / macOS Keychain）加密后存于本地 <code>config/providers.enc</code>，源码不含任何密钥。</p>
        </div>

        <div class="card" style="max-width:560px;margin-top:16px">
          <div class="row" style="margin-bottom:4px">
            <h3 class="sub" style="margin:0">用量与费用</h3>
            <button class="btn btn-ghost btn-sm">刷新</button>
          </div>
          <p class="muted" style="font-size:12px;margin-top:4px">统计本地记录的所有 AI 调用，费用按下方价格估算。</p>
          <div class="usage-grid">
            <div class="usage-cell">
              <div class="label">今日</div>
              <div class="tokens">${fmtTokens(USAGE_SUMMARY.today.total)}</div>
              <div class="cost">${fmtCost(USAGE_SUMMARY.today.cost)}</div>
            </div>
            <div class="usage-cell">
              <div class="label">本月</div>
              <div class="tokens">${fmtTokens(USAGE_SUMMARY.month.total)}</div>
              <div class="cost">${fmtCost(USAGE_SUMMARY.month.cost)}</div>
            </div>
            <div class="usage-cell">
              <div class="label">累计</div>
              <div class="tokens">${fmtTokens(USAGE_SUMMARY.allTime.total)}</div>
              <div class="cost">${fmtCost(USAGE_SUMMARY.allTime.cost)}</div>
            </div>
          </div>
          <div style="margin-top:12px">
            <strong style="font-size:12.5px">按功能分布</strong>
            ${(() => {
              const max = Math.max(...USAGE_SUMMARY.byFeature.map(f => f.total), 1)
              return USAGE_SUMMARY.byFeature.map(f => `
                <div class="usage-feature-row">
                  <span style="min-width:72px">${f.feature}</span>
                  <div class="bar-wrap"><div class="bar-fill" style="width:${(f.total / max) * 100}%"></div></div>
                  <span class="meta" style="min-width:90px;text-align:right">${fmtTokens(f.total)} · ${fmtCost(f.cost)} · ${f.calls}次</span>
                </div>`).join('')
            })()}
          </div>
          <div class="row" style="margin-top:12px">
            <span class="meta">价格（元 / 百万 token，仅用于估算）</span>
            <button class="btn btn-ghost btn-sm">清空记录</button>
          </div>
          <div class="row" style="gap:8px;margin-top:6px">
            <label class="field" style="flex:1;margin:0">
              <span class="meta">输入</span>
              <input class="input" type="number" step="0.1" value="1" />
            </label>
            <label class="field" style="flex:1;margin:0">
              <span class="meta">输出</span>
              <input class="input" type="number" step="0.1" value="3" />
            </label>
            <button class="btn btn-sm" style="align-self:flex-end">保存价格</button>
          </div>
        </div>

        <div class="card" style="max-width:560px;margin-top:16px">
          <h3 class="sub">写作节奏</h3>
          <div class="field" style="margin-top:8px">
            <label>每日字数目标</label>
            <div class="row" style="gap:8px">
              <input class="input" type="number" step="100" value="3000" style="flex:1" />
              <button class="btn btn-sm">保存</button>
            </div>
          </div>
          <div class="row" style="gap:12px">
            <div class="field" style="flex:1">
              <label>专注分钟</label>
              <input class="input" type="number" min="1" value="25" />
            </div>
            <div class="field" style="flex:1">
              <label>休息分钟</label>
              <input class="input" type="number" min="1" value="5" />
            </div>
          </div>
          <button class="btn btn-sm">保存番茄钟</button>
        </div>
      </div>`
    }

    // =================== 路由 ===================
    const PAGES = {
      projects: { title:'项目列表', render: renderProjects },
      chapters: { title:'章节列表', render: renderChapters },
      editor:   { title:'章节编辑器 ✦', render: renderEditor },
      outline:  { title:'大纲', render: renderOutline },
      characters: { title:'人物', render: renderCharacters },
      'memory-center': { title:'记忆中心', render: renderMemoryCenter },
      timeline: { title:'时间线', render: renderTimeline },
      'plot-points': { title:'剧情点', render: renderPlotPoints },
      foreshadow: { title:'伏笔看板', render: renderForeshadow },
      relationship: { title:'人物关系', render: renderRelationship },
      settings: { title:'设置', render: renderSettings }
    }
    function render() {
      const page = (location.hash || '#editor').slice(1)
      const p = PAGES[page] || PAGES.editor
      root.innerHTML = p.render()
    }
    window.addEventListener('hashchange', render)

    const nav = document.getElementById('nav')
    Object.entries(PAGES).forEach(([k, v]) => {
      const a = document.createElement('a')
      a.href = '#' + k
      a.textContent = v.title
      nav.appendChild(a)
    })

    // 主题切换
    let isDark = false
    function setThemePreview(mode) {
      if (mode === 'dark') {
        document.documentElement.classList.add('dark')
        isDark = true
      } else if (mode === 'light') {
        document.documentElement.classList.remove('dark')
        isDark = false
      } else if (mode === 'system') {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        document.documentElement.classList.toggle('dark', prefersDark)
        isDark = prefersDark
      }
    }
    document.getElementById('themeBtn').onclick = () => {
      setThemePreview(isDark ? 'light' : 'dark')
    }
    window.setThemePreview = setThemePreview

    render()
  </script>
</body>
</html>
